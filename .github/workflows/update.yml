name: Update Dashboard

on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false # 🔥 KEY FIX

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Create folders
        run: mkdir -p data assets

      - name: Fetch data
        run: node scripts/fetchData.js

      - name: Capture dashboard
        run: node scripts/capture.js

      - name: Commit & push
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "srinugalla"
          git config user.email "srinugalla@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/srinugalla/world-assets-dashboard.git

          git add assets/dashboard.png data/

          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "📊 update dashboard ($(date)) [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
