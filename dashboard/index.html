<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>World Asset Terminal</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- 🔥 HEADER -->
    <div class="header">
        <h1 class="title">⚡ WORLD ASSET TERMINAL</h1>
        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <!-- 📺 LIVE TICKER -->
    <div class="ticker">
        <div id="tickerContent"></div>
    </div>

    <!-- 🟩 HEATMAP -->
    <div class="heatmap-section">
        <h2>🟩 Market Heatmap</h2>
        <div class="heatmap" id="heatmap"></div>
    </div>

    <!-- 💎 TOP CARDS -->
    <div class="cards-section">
        <h2>💎 Asset Overview</h2>
        <div class="cards">
            <div class="card" id="AAPL"></div>
            <div class="card" id="GOOGL"></div>
            <div class="card" id="BTC"></div>
            <div class="card" id="ETH"></div>
            <div class="card" id="GOLD"></div>
            <div class="card" id="OIL"></div>
        </div>
    </div>

    <!-- 📊 MAIN CHART -->
    <div class="main-chart">
        <h2>📊 Market Trends</h2>
        <canvas id="marketChart"></canvas>
    </div>

    <!-- 🧠 SUMMARY -->
    <div class="summary">
        <h2>🧠 Market Summary</h2>
        <div id="summary"></div>
    </div>

    <!-- LOWER DASHBOARD -->
    <div class="bottom">

        <!-- 🚨 ALERTS -->
        <div class="alerts">
            <h2>🚨 Active Alerts</h2>
            <ul id="alertsList"></ul>
        </div>

        <!-- 🎯 GAUGES -->
        <div class="gauges">
            <div class="gauge"><canvas id="gauge1"></canvas></div>
            <div class="gauge"><canvas id="gauge2"></canvas></div>
            <div class="gauge"><canvas id="gauge3"></canvas></div>
            <div class="gauge"><canvas id="gauge4"></canvas></div>
        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        <p>⚡ Auto-updated via GitHub Actions • Financial Monitoring System</p>
    </div>

    <script>
        window.ASSET_DATA = {};
        window.HISTORY_DATA = {};
    </script>

    <script src="script.js"></script>

</body>

</html>
